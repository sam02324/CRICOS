# EAS Workflow: build an Android APK automatically on every push.
# Requires the GitHub repo to be linked to the EAS project (project → GitHub).
name: CRICOS Android build

on:
  push:
    branches:
      - main
      - master

jobs:
  build_android:
    name: Build Android APK (preview)
    type: build
    params:
      platform: android
      profile: preview
